  {label:'Content',color:'#0369A1',angle:0,orbitR:135,speed:0.0007,icon:'📄'},
  {label:'Standards',color:'#047857',angle:Math.PI*0.33,orbitR:135,speed:0.0006,icon:'⭐'},
  {label:'Learner',color:'#B45309',angle:Math.PI*0.66,orbitR:135,speed:0.0008,icon:'👤'},
  {label:'Assessment',color:'#E11D48',angle:Math.PI,orbitR:135,speed:0.00065,icon:'📝'},
  {label:'Curriculum',color:'#7C3AED',angle:Math.PI*1.33,orbitR:135,speed:0.00055,icon:'📚'},
  {label:'Knowledge',color:'#4338CA',angle:Math.PI*1.66,orbitR:135,speed:0.00075,icon:'🧠'},
  {label:'Product',color:'#B45309',angle:Math.PI*0.16,orbitR:92,speed:0.0009,icon:'💼'},
  {label:'Experience',color:'#0D9488',angle:Math.PI*0.83,orbitR:92,speed:0.001,icon:'🎨'},
  {label:'Pipeline',color:'#C2410C',angle:Math.PI*1.5,orbitR:92,speed:0.00085,icon:'⚙️'},
];

function OntologyNucleus({ ctx }) {
  const canvasRef = useRef(null);
  const wrapRef = useRef(null);
  const nodesRef = useRef(NUCLEUS_DOMAINS.map(d=>({...d})));
  const particlesRef = useRef([]);
  const frameRef = useRef(0);
  const tRef = useRef(0);
  const [hoveredNode, setHoveredNode] = useState(null);
  const [nodePositions, setNodePositions] = useState([]);
  const mouseRef = useRef({x:0,y:0});

  const initParticles = useCallback((W,H) => {
    if (particlesRef.current.length >= 45) return;
    const colors = ['#4338CA','#047857','#7C3AED','#0D9488','#B45309','#E11D48','#0369A1'];
    while(particlesRef.current.length < 45) {
      particlesRef.current.push({
        x:Math.random()*W, y:Math.random()*H,
        vx:(Math.random()-0.5)*0.22, vy:(Math.random()-0.5)*0.22,
        r:Math.random()*1.6+0.4,
        color:colors[Math.floor(Math.random()*colors.length)],
        alpha:Math.random()*0.25+0.05,
      });
    }
  },[]);

  useEffect(()=>{
    const canvas = canvasRef.current;
    const wrap = wrapRef.current;
    if(!canvas || !wrap) return;
    const ctx2d = canvas.getContext('2d');
    let W, H, cx, cy, dpr;
    let running = true;

    function resize(){
      dpr = window.devicePixelRatio || 1;
      W = wrap.clientWidth; H = wrap.clientHeight;
      canvas.width = W*dpr; canvas.height = H*dpr;
      canvas.style.width = W+'px'; canvas.style.height = H+'px';
      ctx2d.setTransform(dpr,0,0,dpr,0,0);
      cx = W/2; cy = H/2;
      initParticles(W,H);
    }

    function draw(){
      if(!running) return;
      tRef.current++;
      const t = tRef.current;
      ctx2d.clearRect(0,0,W,H);

      // Rings
      [{r:135,c:'67,56,202',s:0.0002},{r:92,c:'13,148,136',s:-0.00015},{r:48,c:'124,58,237',s:0.00025}].forEach(ring=>{
        ctx2d.save(); ctx2d.translate(cx,cy); ctx2d.rotate(t*ring.s*60);
        ctx2d.beginPath(); ctx2d.arc(0,0,ring.r,0,Math.PI*2);
        ctx2d.strokeStyle=`rgba(${ring.c},0.08)`; ctx2d.lineWidth=0.8;
        ctx2d.setLineDash([5,8]); ctx2d.stroke(); ctx2d.restore();
      });

      // Particles
      particlesRef.current.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0;
        if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        const dx=cx-p.x, dy=cy-p.y, dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>130){p.vx+=dx*0.000015; p.vy+=dy*0.000015;}
        // Mouse repulsion
        const mx=mouseRef.current.x-p.x, my=mouseRef.current.y-p.y;
        const md=Math.sqrt(mx*mx+my*my);
        if(md<60 && md>0){p.vx-=mx*0.0008; p.vy-=my*0.0008;}
        ctx2d.beginPath(); ctx2d.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx2d.fillStyle=p.color;
        ctx2d.globalAlpha=p.alpha*(0.5+0.5*Math.sin(t*0.0012+p.x));
        ctx2d.fill(); ctx2d.globalAlpha=1;
      });

      // Connection lines from nodes to center
      const nodes = nodesRef.current;
      const positions = [];
      nodes.forEach((n,i)=>{
        n.angle += n.speed;
        const nx = cx + Math.cos(n.angle)*n.orbitR;
        const ny = cy + Math.sin(n.angle)*n.orbitR;
        positions.push({x:nx, y:ny});

        // Line to center with gradient
        const grad = ctx2d.createLinearGradient(cx,cy,nx,ny);
        grad.addColorStop(0, n.color+'08');
        grad.addColorStop(1, n.color+'30');
        ctx2d.beginPath(); ctx2d.moveTo(cx,cy); ctx2d.lineTo(nx,ny);
        ctx2d.strokeStyle=grad; ctx2d.lineWidth= hoveredNode===i ? 2 : 0.7;
        ctx2d.setLineDash([]); ctx2d.stroke();

        // Lines between adjacent nodes
        const next = nodes[(i+1)%nodes.length];
        const nnx = cx + Math.cos(next.angle)*next.orbitR;
        const nny = cy + Math.sin(next.angle)*next.orbitR;
        ctx2d.beginPath(); ctx2d.moveTo(nx,ny); ctx2d.lineTo(nnx,nny);
        ctx2d.strokeStyle = n.color+'0A'; ctx2d.lineWidth=0.4;
        ctx2d.setLineDash([3,5]); ctx2d.stroke();
      });

      // Core glow
      const pulse = 1 + Math.sin(t*0.002)*0.12;
      const g = ctx2d.createRadialGradient(cx,cy,0,cx,cy,44*pulse);
      g.addColorStop(0,'rgba(67,56,202,0.06)');
      g.addColorStop(0.5,'rgba(13,148,136,0.03)');
      g.addColorStop(1,'transparent');
      ctx2d.beginPath(); ctx2d.arc(cx,cy,44*pulse,0,Math.PI*2);
      ctx2d.fillStyle=g; ctx2d.fill();

      // Hovered node highlight ring
      if(hoveredNode !== null && positions[hoveredNode]){
        const hp = positions[hoveredNode];
        const hg = ctx2d.createRadialGradient(hp.x,hp.y,0,hp.x,hp.y,28);
        hg.addColorStop(0, nodes[hoveredNode].color+'20');
        hg.addColorStop(1, 'transparent');
        ctx2d.beginPath(); ctx2d.arc(hp.x,hp.y,28,0,Math.PI*2);
        ctx2d.fillStyle=hg; ctx2d.fill();
      }

      setNodePositions(positions);
      frameRef.current = requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener('resize', resize);
    frameRef.current = requestAnimationFrame(draw);

    return ()=>{
      running = false;
      cancelAnimationFrame(frameRef.current);
      window.removeEventListener('resize', resize);
    };
  },[initParticles, hoveredNode]);

  const handleMouseMove = useCallback((e)=>{
    const rect = wrapRef.current?.getBoundingClientRect();
    if(rect){
      mouseRef.current = {x: e.clientX - rect.left, y: e.clientY - rect.top};
    }
  },[]);

  const coreStyle = {
    position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)',
    width:78, height:78, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
    background:'#fff', border:'2px solid #E0DDD6', zIndex:3,
    boxShadow:'0 0 0 4px rgba(67,56,202,0.06), 0 4px 16px rgba(0,0,0,0.06)',
  };

  const isK12 = ctx === 'k12';

  return (
    <div ref={wrapRef} onMouseMove={handleMouseMove}
      style={{position:'relative',height:400,cursor:'default',userSelect:'none'}}>
      <canvas ref={canvasRef} style={{position:'absolute',inset:0,width:'100%',height:'100%',zIndex:1}}/>

      {/* Core */}
      <div style={coreStyle}>
        <div style={{textAlign:'center',fontFamily:"'Source Serif 4',serif",fontSize:10,fontWeight:700,color:'#4338CA',lineHeight:1.2,letterSpacing:'.04em'}}>
          KADAL<br/>ONTOLOGY
        </div>
      </div>

      {/* Orbiting domain labels */}
      {nodePositions.map((pos,i)=>{
        const n = nodesRef.current[i];
        if(!n || !pos) return null;
        const isHovered = hoveredNode === i;
        return (
          <div key={i}
            onMouseEnter={()=>setHoveredNode(i)}
            onMouseLeave={()=>setHoveredNode(null)}
            style={{
              position:'absolute', left:pos.x-17, top:pos.y-17,
              zIndex: isHovered ? 10 : 4, pointerEvents:'auto',
              display:'flex', flexDirection:'column', alignItems:'center',
              transition:'transform 0.3s cubic-bezier(.34,1.56,.64,1)',
              transform: isHovered ? 'scale(1.35)' : 'scale(1)',
              cursor:'pointer',
            }}>
            <div style={{
              width:34, height:34, borderRadius:'50%',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:14,
              background:'#fff', border:`2px solid ${n.color}30`,
              boxShadow: isHovered
                ? `0 6px 20px ${n.color}25, 0 0 0 3px ${n.color}15`
                : `0 2px 8px rgba(0,0,0,0.08)`,
              transition:'all 0.3s',
            }}>
              {DOMAIN_ICONS[i] ? <span style={{color:n.color,display:'flex'}}>{DOMAIN_ICONS[i]}</span> : n.icon}
            </div>
            <div style={{
              fontFamily:"'Fira Code',monospace", fontSize:7, fontWeight:500,
              letterSpacing:'.05em', textTransform:'uppercase', marginTop:3,
              color: isHovered ? n.color : '#A8A29E',
              opacity: isHovered ? 1 : 0, transition:'all 0.2s',
              textShadow:'0 1px 3px rgba(255,255,255,0.8)',
              whiteSpace:'nowrap',
            }}>
              {n.label}
            </div>
            {/* Tooltip on hover */}
            {isHovered && (
              <div style={{
                position:'absolute', top:-40, left:'50%', transform:'translateX(-50%)',
                background:'#1C1917', color:'#fff', padding:'4px 10px', borderRadius:6,
                fontFamily:"'Fira Code',monospace", fontSize:8, fontWeight:500,
                whiteSpace:'nowrap', boxShadow:'0 4px 12px rgba(0,0,0,0.15)',
                animation:'fadeIn 0.15s ease',
              }}>
                {isK12
                  ? {Content:'Chapters · Lessons · Workbooks',Standards:'CCSS · NGSS · State Frameworks',Learner:'IEP/504 · Lexile · Grade Band',Assessment:'State Tests · DOK · Mastery',Curriculum:'Scope & Sequence · Pacing',Knowledge:'Prerequisite Lattice · Concepts',Product:'Adoptions · Print+Digital',Experience:'Lexile Variants · Chromebook',Pipeline:'State Adoption Workflows'}[n.label]
                  : {Content:'Courseware · OER · Simulations',Standards:'CLOs · PLOs · Accreditation',Learner:'Credits · GPA · Degree Audit',Assessment:'Portfolios · Licensure Prep',Curriculum:'Credit Modules · Pathways',Knowledge:'Competencies · O*NET Skills',Product:'Site Licenses · Micro-Creds',Experience:'LTI · VR Labs · Mobile',Pipeline:'Faculty Review · IRB'}[n.label]
                }
              </div>
            )}
          </div>
        );
      })}

      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}`}</style>
    </div>
  );
}

                        {key ? <span style={{...sty.mono,fontSize:7,fontWeight:600,padding:'1px 5px',borderRadius:3,background:(keyColors[key]||'#ccc')+'15',color:keyColors[key]||'#666'}}>{key}</span> : <span/>}
                        <span style={{...sty.mono,fontSize:8.5,color:'#A8A29E',background:'#FAFAF8',padding:'1px 5px',borderRadius:3}}>{type}</span>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        )}

      </div>

      <ScrollTracker/>
    </div>
  );
}

function ScrollTracker(){
  useEffect(()=>{
    const handler = ()=>{
      const h = document.documentElement.scrollHeight - window.innerHeight;
      const bar = document.getElementById('sbar');
      if(bar && h > 0) bar.style.width = (window.scrollY/h*100)+'%';
    };
    window.addEventListener('scroll',handler);
    return ()=>window.removeEventListener('scroll',handler);
  },[]);
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(KadalOS));
</script>
